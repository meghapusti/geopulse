version: '3.9'

services:

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: geopulse
      POSTGRES_USER: geopulse
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geopulse"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://geopulse:password@postgres:5432/geopulse
      DATABASE_URL_SYNC: postgresql://geopulse:password@postgres:5432/geopulse
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    volumes:
      - ../backend:/app
      - ../data:/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
