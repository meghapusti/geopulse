[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Sync URL used by Alembic CLI (async URL used at runtime by SQLAlchemy)
# Override via DATABASE_URL_SYNC env var or set directly here for local dev
sqlalchemy.url = postgresql://geopulse:password@localhost:5432/geopulse

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
